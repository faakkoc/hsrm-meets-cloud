name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Decode GCP Credentials
      run: |
        echo "${{ secrets.GCP_CREDENTIALS_BASE64 }}" | base64 -d > gcp-key.json

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v0
      with:
        credentials_json: gcp-key.json

    - name: Configure GKE Cluster
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: gcp-key.json
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    - name: Build and Push Docker Images
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:latest ./frontend
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:latest ./backend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:latest
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:latest

    - name: Deploy to GKE
      run: |
        kubectl apply -f kubernetes/frontend-deployment.yaml
        kubectl apply -f kubernetes/backend-deployment.yaml
        kubectl apply -f kubernetes/service.yaml
